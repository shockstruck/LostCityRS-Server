---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Lowercase Registry Owner
        id: registry-owner
        run: echo "lowercase=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ steps.registry-owner.outputs.lowercase }}/lostcityrs-server
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Image
        id: push
        uses: docker/bake-action@76cc0fa876eb29ec1b0f70bc8b0968a657c0b398 # v6.5.0
        with:
          files: |
            ./docker-bake.hcl
            ${{ steps.meta.outputs.bake-file-tags }}
            ${{ steps.meta.outputs.bake-file-labels }}
            ${{ steps.meta.outputs.bake-file-annotations }}
          set: |
            image.output=type=image,push=true,compression=zstd
            image.platform=linux/amd64,linux/arm64
            image.cache-from=type=gha
            image.cache-to=type=gha,mode=max
          targets: image
          source: .

      - name: Get Image Digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.IMAGE_REGISTRY }}/${{ steps.registry-owner.outputs.lowercase }}/lostcityrs-server:latest --format '{{ json . }}' | jq -r '.manifest.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ steps.registry-owner.outputs.lowercase }}/lostcityrs-server
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
